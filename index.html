<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Katak Interaktif: Ekosistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap');

        :root {
            --sky-sunny: #87CEEB;
            --sky-cloudy: #5c6c75;
            --water: #4fc3f7;
            --leaf: #4caf50;
        }

        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling */
            background-color: #1a202c;
            color: #fff;
            touch-action: manipulation;
        }

        .title-font { font-family: 'Fredoka One', cursive; }

        /* Split Screen Layouts */
        .game-wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
            flex-direction: row; /* Default Landscape (Vertical Split) */
        }
        
        @media (max-aspect-ratio: 1/1) {
            /* Portrait Mode (HP) (Horizontal Stack) */
            .game-wrapper { flex-direction: column; }
        }

        .player-screen {
            flex: 1;
            position: relative;
            border: 2px solid #2d3748;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background-color 1s ease;
        }

        /* Environment & Weather */
        .sky {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, var(--sky-sunny) 0%, #e0f7fa 100%);
            transition: background 1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .sky.cloudy {
            background: linear-gradient(to bottom, var(--sky-cloudy) 0%, #90a4ae 100%);
        }

        .water {
            height: 15%;
            background: linear-gradient(to bottom, var(--water) 0%, #0288d1 100%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            border-top: 4px solid #29b6f6;
        }

        /* Rain Animation */
        .rain {
            position: absolute;
            top: -100px;
            width: 2px;
            height: 20px;
            background: rgba(255,255,255,0.6);
            animation: fall linear forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        /* Water Ripple */
        .ripple {
            position: absolute;
            top: 0;
            width: 20px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
            opacity: 1;
            animation: ripple-expand 1s ease-out forwards;
        }

        @keyframes ripple-expand {
            to { width: 150px; height: 50px; opacity: 0; transform: translateY(-5px); }
        }

        /* Hearts */
        .heart {
            position: absolute;
            font-size: 24px;
            animation: float-up 1.5s ease-in forwards;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* Leaves */
        .leaf-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin-top: auto;
            margin-bottom: 20px;
            z-index: 5;
        }

        .leaf-btn {
            background: var(--leaf);
            border-radius: 50% 0 50% 50%; /* Leaf shape */
            padding: 10px;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: clamp(10px, 1.8vh, 16px);
            cursor: pointer;
            box-shadow: 0 5px 0 #2e7d32, 0 8px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s, filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            user-select: none;
            word-break: break-word;
        }

        @media (max-width: 600px) {
            .leaf-btn { padding: 5px; min-height: 45px; font-size: 11px; }
        }

        .leaf-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #2e7d32;
        }

        .leaf-btn.disabled {
            pointer-events: none;
            filter: grayscale(80%);
            opacity: 0.5;
        }

        .base-leaf {
            width: 120px;
            height: 40px;
            background: #66bb6a;
            border-radius: 50%;
            position: absolute;
            bottom: -20px;
            box-shadow: 0 5px 0 #388e3c;
            transition: bottom 0.5s ease;
        }

        /* Frog */
        .frog {
            width: 80px;
            height: 80px;
            position: absolute;
            bottom: 10px;
            transition: all 0.5s cubic-bezier(0.25, 0.75, 0.5, 1.25);
            z-index: 15;
        }

        .frog.jumping {
            transform: translateY(-150px) scale(1.1);
        }
        
        .frog.falling {
            transform: translateY(150px) rotate(180deg) scale(0.5);
            opacity: 0;
            transition: all 1s ease-in;
        }

        /* UI Elements */
        .question-box {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 10px 15px;
            border-radius: 15px;
            text-align: center;
            font-weight: 800;
            font-size: clamp(11px, 2vh, 16px);
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 500px;
            z-index: 5;
            max-height: 35vh;
            overflow-y: auto;
        }

        .feedback-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(16px, 4vh, 32px);
            font-weight: 900;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            color: #ffd700;
            opacity: 0;
            pointer-events: none;
            z-index: 30;
            text-align: center;
            width: 100%;
        }

        @keyframes pop-in-out {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }

        .top-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .btn-control {
            background: #fff;
            color: #333;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 20px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 5px 10px;
            background: rgba(0,0,0,0.3);
            font-size: clamp(10px, 1.5vh, 14px);
            font-weight: bold;
        }

        /* Screen Transitions */
        #game-ui { display: none; opacity: 0; transition: opacity 0.5s; }
        #main-menu { transition: opacity 0.5s; }

    </style>
</head>
<body>

    <!-- Main Menu -->
    <div id="main-menu" class="flex flex-col items-center justify-center w-screen h-screen bg-green-500 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMiIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjMpIi8+PC9zdmc+')]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-md mx-4">
            <div class="text-5xl mb-2">🐸🌿</div>
            <h1 class="title-font text-3xl text-green-700 mb-1">Game Katak Interaktif</h1>
            <h2 class="text-xl text-green-600 font-bold mb-4">Lompatan Matematika</h2>
            <p class="text-gray-500 mb-6 text-sm font-bold">Oleh: Hanna Arsyinta</p>
            
            <div class="flex flex-col gap-3">
                <button onclick="startGame(1)" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-full text-lg shadow-lg transform hover:scale-105 transition">👤 Solo (1 Pemain)</button>
                <button onclick="startGame(2)" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-6 rounded-full text-lg shadow-lg transform hover:scale-105 transition">⚔️ Duel (2 Pemain)</button>
                <button onclick="startGame(3)" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-3 px-6 rounded-full text-lg shadow-lg transform hover:scale-105 transition">🔥 Triple (3 Pemain)</button>
            </div>
            <p class="mt-6 text-xs text-gray-400">Pilih mode untuk mulai bermain</p>
        </div>
    </div>

    <!-- Global Controls -->
    <div id="global-controls" class="top-controls hidden">
        <button class="btn-control" onclick="goHome()" title="Home">🏠</button>
        <button class="btn-control" id="btn-audio" onclick="toggleAudio()" title="BGM">🔇</button>
        <button class="btn-control" onclick="toggleFullScreen()" title="Full Screen">⛶</button>
    </div>

    <!-- Game UI Container -->
    <div id="game-ui" class="game-wrapper">
        <!-- Player screens injected here -->
    </div>

    <script>
        // --- DATA SOAL ---
        const soalList = [
            { q: "1. Sudut yang besarnya lebih dari 180° dan kurang dari 360° adalah ....", a: "Sudut siku-siku", b: "Sudut tumpul", c: "Sudut lurus", d: "Sudut refleks", ans: "d", msg: "Hebat! Katak melompat tinggi!" },
            { q: "2. Perhatikan gambar berikut! [Gambar] \nBesar sudut tersebut adalah ....", a: "30°", b: "45°", c: "60°", d: "90°", ans: "b", msg: "Lompatan super!" },
            { q: "3. Sudut siku-siku jika diperagakan dengan simaphore membentuk huruf ....", a: "H", b: "A", c: "P", d: "N", ans: "c", msg: "🌟 Benar sekali!" },
            { q: "4. Segi empat yang memiliki diagonal tidak sama panjang adalah ....", a: "Persegi", b: "Jajar genjang", c: "Persegi panjang", d: "Trapesium sama kaki", ans: "b", msg: "🍀 Katak menyukai ini!" },
            { q: "5. Perhatikan gambar di bawah ini! [Gambar]\nLuas bangun yang berwarna putih adalah ....", a: "Sesuai Pilihan A", b: "Sesuai Pilihan B", c: "Sesuai Pilihan C", d: "Sesuai Pilihan D", ans: "a", msg: "🌱 Lompatan mantap!" },
            { q: "6. Data yang diperoleh melalui pengukuran, pengamatan, dan bertanya secara langsung, termasuk ke dalam data ....", a: "Tersier", b: "Sekunder", c: "Primer", d: "Prima", ans: "c", msg: "🎉 Kamu luar biasa!" },
            { q: "7. Luna adalah seorang jurnalis yang ingin mengumpulkan data banyak penumpang di bulan Maret – Mei. Ia menemui salah satu petugas di KAI untuk mengumpulkan data tersebut. Luna mengumpulkan data secara ....", a: "Tes", b: "Observasi", c: "Angket", d: "Wawancara", ans: "d", msg: "💧 Perhitungan tepat!" },
            { q: "8. Jarak dari Bumi ke Bulan diperkirakan sekitar 384.427 km. Lambang bilangan dari jarak tersebut adalah .....", a: "384.427", b: "384.402", c: "348.407", d: "304.427", ans: "a", msg: "🌟 Jawaban cerdas!" },
            { q: "9. Kabupaten Magetan memiliki 514.589 laki-laki dan 49.254 perempuan. Total penduduknya adalah ....", a: "573.735", b: "564.833", c: "563.843", d: "553.835", ans: "d", msg: "🔥 Wah, kamu teliti!" },
            { q: "10. Hasil dari 25.204 x 12 adalah ....", a: "320.448", b: "315.408", c: "308.840", d: "302.448", ans: "a", msg: "🏆 SELAMAT! Mencapai kolam kehidupan!" }
        ];

        // --- GAME STATE ---
        let players = [];
        let numPlayers = 1;
        let isAudioOn = false;
        let audioCtx;

        // --- SVG ASSETS (Katak) ---
        const svgFrogNormal = `<svg viewBox="0 0 100 100"><circle cx="50" cy="60" r="35" fill="#4ade80"/><circle cx="30" cy="30" r="15" fill="#4ade80"/><circle cx="70" cy="30" r="15" fill="#4ade80"/><circle cx="30" cy="28" r="6" fill="#fff"/><circle cx="70" cy="28" r="6" fill="#fff"/><circle cx="30" cy="28" r="3" fill="#000"/><circle cx="70" cy="28" r="3" fill="#000"/><path d="M 40 65 Q 50 70 60 65" stroke="#166534" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`;
        const svgFrogHappy = `<svg viewBox="0 0 100 100"><circle cx="50" cy="60" r="35" fill="#4ade80"/><circle cx="30" cy="30" r="15" fill="#4ade80"/><circle cx="70" cy="30" r="15" fill="#4ade80"/><path d="M 25 28 Q 30 23 35 28" stroke="#166534" stroke-width="3" fill="none"/><path d="M 65 28 Q 70 23 75 28" stroke="#166534" stroke-width="3" fill="none"/><path d="M 35 60 Q 50 80 65 60 Z" fill="#ef4444"/></svg>`;
        const svgFrogSad = `<svg viewBox="0 0 100 100"><circle cx="50" cy="60" r="35" fill="#4ade80"/><circle cx="30" cy="30" r="15" fill="#4ade80"/><circle cx="70" cy="30" r="15" fill="#4ade80"/><circle cx="30" cy="28" r="6" fill="#fff"/><circle cx="70" cy="28" r="6" fill="#fff"/><circle cx="30" cy="30" r="3" fill="#000"/><circle cx="70" cy="30" r="3" fill="#000"/><path d="M 40 70 Q 50 60 60 70" stroke="#166534" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="25" cy="40" r="3" fill="#60a5fa"/><circle cx="75" cy="40" r="3" fill="#60a5fa"/></svg>`;

        // --- AUDIO SYSTEM (Web Audio API) ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playTone(freq, type, duration, vol = 0.1) {
            if (!isAudioOn || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playBGM() {
            if (!isAudioOn || !audioCtx) return;
            window.bgmInterval = setInterval(() => {
                const notes = [261.63, 329.63, 392.00, 523.25]; // C, E, G, C
                const note = notes[Math.floor(Math.random() * notes.length)];
                playTone(note, 'sine', 0.5, 0.05);
            }, 500);
        }

        function stopBGM() {
            if (window.bgmInterval) clearInterval(window.bgmInterval);
        }

        function toggleAudio() {
            isAudioOn = !isAudioOn;
            document.getElementById('btn-audio').innerText = isAudioOn ? '🔊' : '🔇';
            if (isAudioOn) {
                initAudio();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                playBGM();
            } else {
                stopBGM();
            }
        }

        function playJumpSound() { playTone(400, 'sine', 0.1); setTimeout(()=>playTone(600, 'sine', 0.2), 100); }
        function playFallSound() { playTone(200, 'sawtooth', 0.5); setTimeout(()=>playTone(100, 'sawtooth', 0.5), 200); }
        function playWinSound() { playTone(523.25, 'square', 0.2, 0.2); setTimeout(()=>playTone(659.25, 'square', 0.4, 0.2), 200); }

        // --- FULL SCREEN ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // --- UI & LOGIC ---
        function goHome() {
            document.getElementById('game-ui').style.opacity = 0;
            document.getElementById('global-controls').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('game-ui').style.display = 'none';
                document.getElementById('main-menu').style.display = 'flex';
                document.getElementById('main-menu').style.opacity = 1;
                document.getElementById('game-ui').innerHTML = '';
            }, 500);
            players = [];
        }

        function startGame(num) {
            numPlayers = num;
            players = [];
            for (let i = 0; i < num; i++) {
                players.push({ id: i + 1, score: 0, level: 0, active: true });
            }

            document.getElementById('main-menu').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('main-menu').style.display = 'none';
                buildGameUI();
                document.getElementById('game-ui').style.display = 'flex';
                document.getElementById('global-controls').classList.remove('hidden');
                
                requestAnimationFrame(() => {
                    document.getElementById('game-ui').style.opacity = 1;
                });
            }, 500);
        }

        function buildGameUI() {
            const container = document.getElementById('game-ui');
            container.innerHTML = '';
            
            const colors = ['#1e40af', '#b45309', '#6b21a8'];

            players.forEach(p => {
                const pDiv = document.createElement('div');
                pDiv.className = `player-screen`;
                pDiv.id = `player-${p.id}`;
                pDiv.style.borderColor = colors[p.id - 1];

                pDiv.innerHTML = `
                    <div class="hud" style="background:${colors[p.id - 1]}">
                        <span>Pemain ${p.id}</span>
                        <span>Level: <span id="lvl-${p.id}">1</span>/10</span>
                        <span>Skor: <span id="score-${p.id}">0</span></span>
                    </div>
                    <div class="sky" id="sky-${p.id}">
                        <div class="question-box" id="qbox-${p.id}"></div>
                        <div class="feedback-text" id="feedback-${p.id}"></div>
                        
                        <div class="leaf-container" id="leaves-${p.id}">
                            <div class="leaf-btn" onclick="answer(${p.id}, 'a')" id="btn-${p.id}-a">A</div>
                            <div class="leaf-btn" onclick="answer(${p.id}, 'b')" id="btn-${p.id}-b">B</div>
                            <div class="leaf-btn" onclick="answer(${p.id}, 'c')" id="btn-${p.id}-c">C</div>
                            <div class="leaf-btn" onclick="answer(${p.id}, 'd')" id="btn-${p.id}-d">D</div>
                        </div>

                    </div>
                    <div class="water" id="water-${p.id}">
                        <div class="base-leaf"></div>
                        <div class="frog" id="frog-${p.id}">
                            ${svgFrogNormal}
                        </div>
                    </div>
                `;
                container.appendChild(pDiv);
                loadQuestion(p.id);
            });
        }

        function loadQuestion(pId) {
            const p = players.find(x => x.id === pId);
            if (p.level >= soalList.length) {
                showWinScreen(pId);
                return;
            }

            const qData = soalList[p.level];
            document.getElementById(`qbox-${pId}`).innerText = qData.q;
            document.getElementById(`btn-${pId}-a`).innerText = `A. ${qData.a}`;
            document.getElementById(`btn-${pId}-b`).innerText = `B. ${qData.b}`;
            document.getElementById(`btn-${pId}-c`).innerText = `C. ${qData.c}`;
            document.getElementById(`btn-${pId}-d`).innerText = `D. ${qData.d}`;
            document.getElementById(`lvl-${pId}`).innerText = p.level + 1;

            const leaves = document.querySelectorAll(`#leaves-${pId} .leaf-btn`);
            leaves.forEach(l => {
                l.classList.remove('disabled');
                l.style.opacity = 1;
            });
            document.getElementById(`sky-${pId}`).classList.remove('cloudy');
            document.getElementById(`frog-${pId}`).innerHTML = svgFrogNormal;
            document.getElementById(`frog-${pId}`).className = 'frog';
            p.active = true;
        }

        function answer(pId, ansSelected) {
            const p = players.find(x => x.id === pId);
            if (!p.active) return;
            p.active = false;

            const qData = soalList[p.level];
            const isCorrect = (ansSelected === qData.ans);

            document.querySelectorAll(`#leaves-${pId} .leaf-btn`).forEach(l => l.classList.add('disabled'));

            const frog = document.getElementById(`frog-${pId}`);
            const sky = document.getElementById(`sky-${pId}`);
            const water = document.getElementById(`water-${pId}`);
            const feedback = document.getElementById(`feedback-${pId}`);

            if (isCorrect) {
                playJumpSound();
                frog.innerHTML = svgFrogHappy;
                frog.classList.add('jumping');
                p.score += 100;
                document.getElementById(`score-${pId}`).innerText = p.score;
                
                for(let i=0; i<5; i++){
                    createEffect(sky, '❤️', 'heart', Math.random()*80 + 10, 50);
                }

                feedback.innerText = qData.msg;
                feedback.style.color = '#ffd700';
                feedback.style.animation = 'none';
                void feedback.offsetWidth;
                feedback.style.animation = 'pop-in-out 2s forwards';

                ['a','b','c','d'].forEach(x => {
                    if (x !== qData.ans) document.getElementById(`btn-${pId}-${x}`).style.opacity = 0;
                });

                setTimeout(() => {
                    p.level++;
                    loadQuestion(pId);
                }, 2000);

            } else {
                playFallSound();
                frog.innerHTML = svgFrogSad;
                frog.classList.add('falling');
                sky.classList.add('cloudy');
                
                feedback.innerText = "Ups! Tetap Semangat!";
                feedback.style.color = '#ff6b6b';
                feedback.style.animation = 'none';
                void feedback.offsetWidth;
                feedback.style.animation = 'pop-in-out 2s forwards';

                const rainInterval = setInterval(() => {
                    createEffect(sky, '', 'rain', Math.random()*100, -10);
                }, 100);

                setTimeout(() => {
                    const ripple = document.createElement('div');
                    ripple.className = 'ripple';
                    water.appendChild(ripple);
                    setTimeout(()=>ripple.remove(), 1000);
                }, 500);

                setTimeout(() => {
                    clearInterval(rainInterval);
                    p.level++; // Tetap lanjut ke pertanyaan selanjutnya jika salah
                    loadQuestion(pId);
                }, 2500);
            }
        }

        function createEffect(parent, content, className, leftPct, topPct) {
            const el = document.createElement('div');
            el.className = className;
            el.innerText = content;
            el.style.left = leftPct + '%';
            if(className === 'heart') {
                el.style.top = topPct + '%';
                el.style.animationDuration = (Math.random() * 1 + 1) + 's';
            }
            parent.appendChild(el);
            setTimeout(() => el.remove(), 2000);
        }

        function showWinScreen(pId) {
            const p = players.find(x => x.id === pId);
            const sky = document.getElementById(`sky-${pId}`);
            playWinSound();
            sky.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center z-20">
                    <div class="text-6xl mb-4 animate-bounce">🏆🐸</div>
                    <h2 class="title-font text-3xl text-yellow-300 mb-2">SELESAI!</h2>
                    <p class="text-xl font-bold bg-white text-green-700 px-6 py-2 rounded-full shadow-lg">Skor Akhir: ${p.score}</p>
                    <p class="mt-4 font-bold text-sm">Menunggu yang lain...</p>
                </div>
            `;
            document.getElementById(`frog-${pId}`).innerHTML = svgFrogHappy;
            
            setInterval(() => {
                createEffect(sky, '✨', 'heart', Math.random()*90, 50);
            }, 300);
        }
    </script>
</body>
